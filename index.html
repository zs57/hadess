<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة الحديث الشريف | بوابة الدخول</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@400;600;700;900&display=swap');

        :root {
            --paper: #f9f8f4;
            --ink: #1a1a1a;
            --border: #dcd7cb;
            --accent-red: #e76f51;
            --accent-green: #2a9d8f;
            --highlight: #ffde6b;
            --shadow: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --paper: #0f1114;
            --ink: #f1f5f9;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Cairo", sans-serif; transition: 0.3s; }
        body { background: var(--paper); color: var(--ink); min-height: 100vh; overflow-x: hidden; }

        /* ====== GATEWAY OVERLAY ====== */
        #gateway {
            position: fixed; inset: 0; background: var(--paper); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 2rem; text-align: center; overflow-y: auto;
        }
        #gateway.fade-out { transform: translateY(-100%); opacity: 0; pointer-events: none; transition: 0.8s cubic-bezier(0.19, 1, 0.22, 1); }

        .gateway-title { font-family: "Amiri", serif; font-size: clamp(2.5rem, 6vw, 4rem); color: var(--accent-red); margin-bottom: 1rem; }
        .gateway-sub { font-size: 1.2rem; color: var(--ink); opacity: 0.8; margin-bottom: 3rem; font-weight: 700; }

        .book-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem; width: 100%; max-width: 1100px;
        }
        .book-card {
            background: #fff; border: 2px solid var(--ink); border-radius: 15px; padding: 2rem;
            cursor: pointer; box-shadow: 5px 5px 0 var(--ink); transition: 0.3s;
            display: flex; flex-direction: column; align-items: center; gap: 1rem;
        }
        .book-card:hover { transform: translateY(-10px); background: var(--highlight); }
        .book-card i { font-size: 2.5rem; color: var(--accent-red); }

        /* ====== MAIN CONTENT (HIDDEN INITIALLY) ====== */
        nav {
            position:fixed; top:0; left:0; right:0; z-index:1000; padding:0.8rem 2.5rem;
            display:flex; align-items:center; justify-content:space-between;
            background: rgba(255,255,255,0.8); backdrop-filter:blur(10px); border-bottom:2px solid var(--ink);
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 8rem 2rem 4rem; }

        .search-wrap { max-width: 700px; margin: 0 auto 3rem; position: relative; }
        .search-wrap input {
            width: 100%; border: 2px solid var(--ink); border-radius: 50px; padding: 1rem 3.5rem 1rem 1.5rem;
            font-size: 1.1rem; background: #fff; box-shadow: 4px 4px 0 var(--ink); outline: none;
        }
        .search-wrap i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 1.4rem; color: var(--accent-red); }

        .hadith-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 2.5rem; }
        
        .notebook {
            background: #fff; border: 2px solid var(--ink); border-radius: 4px 15px 15px 4px;
            padding: 2.5rem; box-shadow: 8px 8px 0 var(--shadow); position: relative;
            animation: fadeInUp 0.6s ease both;
        }
        .notebook::before {
            content: ""; position: absolute; top: 10px; bottom: 10px; right: 12px; width: 4px;
            background: repeating-linear-gradient(to bottom, var(--ink), var(--ink) 4px, transparent 4px, transparent 20px);
        }

        .hadith-text { font-family: "Amiri", serif; font-size: 1.6rem; line-height: 2.3; margin-bottom: 1.5rem; text-align: justify; }
        .meta-row { display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px dashed var(--border); padding-top: 1rem; }
        .badge { border: 1px solid var(--ink); padding: 4px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; background: var(--paper); }

        .whatsapp-float {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
            background: #25d366; color: white; border: 2px solid var(--ink);
            width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 4px 4px 0 var(--ink); text-decoration: none; font-size: 2rem;
        }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
        .loading { display: none; text-align: center; padding: 4rem; }
        .spinner { border: 4px solid var(--border); border-top-color: var(--accent-red); width: 40px; height: 40px; border-radius: 50%; animation: spin 1s infinite linear; margin: auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <!-- Gateway Screen -->
    <div id="gateway">
        <h1 class="gateway-title">مَوْسُوعَةُ الحَدِيثِ الشَّرِيفِ</h1>
        <p class="gateway-sub">يرجى اختيار الكتاب لبدء التصفح (سيتم تحميل 500 حديث فوراً)</p>
        <div class="book-grid" id="book-selector">
            <div class="book-card" onclick="startApp('all')">
                <i class="ri-stack-line"></i>
                <h3>كل الموسوعة</h3>
            </div>
            <!-- Dynamic Books -->
        </div>
    </div>

    <!-- Main Content -->
    <nav>
        <div style="font-family:'Amiri'; font-weight:900; font-size:1.6rem;">بوابة الحديث</div>
        <div style="display:flex; gap:1rem; align-items:center;">
            <div id="counter" style="font-weight:800; color:var(--accent-red);">جاري التجهيز...</div>
            <button onclick="document.documentElement.setAttribute('data-theme', document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark')" style="border:2px solid var(--ink); background:#fff; padding:5px 10px; border-radius:8px; cursor:pointer;"><i class="ri-moon-line"></i></button>
        </div>
    </nav>

    <main class="container">
        <div class="search-wrap">
            <i class="ri-search-2-line"></i>
            <input type="text" id="search" placeholder="ابحث في المتون أو الرواة أو المواضيع...">
        </div>

        <div class="hadith-grid" id="grid"></div>
        <div id="loader" class="loading"><div class="spinner"></div></div>
    </main>

    <a href="https://wa.me/20102891489" class="whatsapp-float"><i class="ri-whatsapp-line"></i></a>

    <script>
        const catMap = { 'ahmad': 'مسند أحمد', 'bukhari': 'صحيح البخاري', 'muslim': 'صحيح مسلم', 'tirmidhi': 'جامع الترمذي', 'abudawud': 'سنن أبي داود', 'nasai': 'سنن النسائي', 'ibnmajah': 'سنن ابن ماجه', 'malik': 'موطأ مالك' };
        let currentCat = 'all'; let query = ''; let page = 1;

        async function init() {
            const res = await fetch('/api/categories');
            const json = await res.json();
            const selector = document.getElementById('book-selector');
            json.data.forEach(c => {
                const div = document.createElement('div');
                div.className = 'book-card';
                div.onclick = () => startApp(c);
                div.innerHTML = `<i class="ri-book-3-line"></i><h3>${catMap[c] || c}</h3>`;
                selector.appendChild(div);
            });
        }

        async function startApp(cat) {
            currentCat = cat;
            document.getElementById('gateway').classList.add('fade-out');
            loadData(true);
        }

        async function loadData(reset = false) {
            const grid = document.getElementById('grid');
            const loader = document.getElementById('loader');
            if (reset) { grid.innerHTML = ''; page = 1; }
            loader.style.display = 'block';

            try {
                // نطلب 500 حديث دفعة واحدة كما طلب المستخدم
                const res = await fetch(`/api/hadiths?category=${currentCat}&q=${encodeURIComponent(query)}&page=${page}&limit=500`);
                const json = await res.json();
                render(json.data);
                document.getElementById('counter').textContent = `تم تحميل ${grid.children.length} حديث`;
            } catch(e) {}
            loader.style.display = 'none';
        }

        function render(data) {
            const grid = document.getElementById('grid');
            data.forEach(h => {
                const div = document.createElement('div');
                div.className = 'notebook';
                div.innerHTML = `
                    <div style="color:var(--accent-red); font-weight:900; margin-bottom:1rem; font-size:0.85rem;">عن ${h.chapter}</div>
                    <div class="hadith-text">${h.text}</div>
                    ${h.english ? `<div style="direction:ltr; text-align:left; font-size:0.9rem; color:var(--accent-green); border-left:3px solid var(--accent-red); padding-left:15px; margin-bottom:1rem;">${h.english}</div>` : ''}
                    <div class="meta-row">
                        <div class="badge">${h.source}</div>
                        ${h.ref ? `<div class="badge">${h.ref}</div>` : ''}
                        ${h.grade ? `<div class="badge" style="background:var(--accent-green); color:white;">${h.grade}</div>` : ''}
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        // Infinite scroll for next 500s
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) {
                if (!document.getElementById('loader').style.display === 'block') {
                    page++;
                    loadData();
                }
            }
        };

        let timer;
        document.getElementById('search').oninput = (e) => {
            clearTimeout(timer);
            timer = setTimeout(() => { query = e.target.value; loadData(true); }, 600);
        };

        init();
    </script>
</body>
</html>
