<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة الحديث الشريف | الإصدار الشامل</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@300;400;500;700;800;900&display=swap');

        :root {
            --bg-primary: #05080a;
            --bg-secondary: #0d1217;
            --accent-gold: #d4af37;
            --accent-emerald: #10b981;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(13, 18, 23, 0.9);
            --glass-border: rgba(212, 175, 55, 0.2);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }

        body {
            background: radial-gradient(circle at 0% 0%, #1a3a32 0%, #05080a 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.8;
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 5%;
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { 
            display: flex; align-items: center; gap: 12px; 
            font-size: 2rem; font-weight: 900; 
            background: linear-gradient(to right, var(--accent-gold), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero { text-align: center; padding: 4rem 1rem 2rem; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 1rem; font-family: 'Amiri', serif; color: var(--accent-gold); }

        .search-box {
            max-width: 800px; margin: 2rem auto 3rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px; padding: 1rem 2.5rem;
            display: flex; align-items: center; gap: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .search-box input { background: transparent; border: none; color: white; width: 100%; font-size: 1.2rem; outline: none; }

        .categories-grid {
            display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1.5rem; margin-bottom: 3rem;
            scrollbar-width: none;
        }
        .categories-grid::-webkit-scrollbar { display: none; }
        
        .cat-card {
            flex: 0 0 auto; background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 0.8rem 1.5rem;
            cursor: pointer; transition: var(--transition);
            display: flex; align-items: center; gap: 8px;
        }
        .cat-card.active { background: var(--accent-gold); color: black; border-color: white; }

        .hadith-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2rem; }
        
        .hadith-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px; padding: 2rem;
            transition: var(--transition);
            display: flex; flex-direction: column;
            animation: slideUp 0.6s ease forwards;
        }
        .hadith-card:hover { transform: translateY(-8px); border-color: var(--accent-gold); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }

        .hadith-text { font-family: 'Amiri', serif; font-size: 1.5rem; text-align: justify; margin-bottom: 1.5rem; color: #fff; line-height: 2.2; }
        .hadith-english { font-size: 0.9rem; color: var(--text-secondary); text-align: left; direction: ltr; margin-bottom: 1.5rem; opacity: 0.8; }
        
        .sanad-box { 
            background: rgba(212, 175, 55, 0.05); border-right: 3px solid var(--accent-gold);
            padding: 10px 15px; margin-bottom: 1.5rem; font-size: 0.9rem; color: var(--accent-gold);
        }

        .hadith-footer {
            margin-top: auto; padding-top: 1rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center;
        }
        .badge { background: rgba(255,255,255,0.05); color: var(--text-secondary); padding: 4px 10px; border-radius: 8px; font-size: 0.75rem; }
        .grade-badge { background: rgba(16, 185, 129, 0.1); color: var(--accent-emerald); font-weight: bold; border: 1px solid var(--accent-emerald); }

        #load-more-trigger { height: 100px; display: flex; align-items: center; justify-content: center; width: 100%; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .loading-spinner { width: 40px; height: 40px; border: 4px solid var(--glass-border); border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 1s infinite linear; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i data-lucide="library"></i>
            <span>موسوعة<span>الحديث</span></span>
        </div>
        <div id="stats" style="color: var(--accent-gold); font-size: 0.9rem;">جاري جرد الموسوعة...</div>
    </header>

    <main class="container">
        <div class="hero">
            <h1>السُّنَّةُ النَّبَوِيَّةُ المُطَهَّرَةُ</h1>
            <p style="color: var(--text-secondary);">عرض شامل لكافة الأحاديث والأسانيد والمراجع</p>
        </div>

        <div class="search-box">
            <i data-lucide="search" style="color: var(--accent-gold);"></i>
            <input type="text" id="main-search" placeholder="ابحث في المتون، الرواة، أو المواضيع...">
        </div>

        <div class="categories-grid" id="cat-list">
            <div class="cat-card active" data-cat="all"><i data-lucide="layers"></i>الكل</div>
        </div>

        <div class="hadith-grid" id="main-grid"></div>
        <div id="load-more-trigger"><div class="loading-spinner"></div></div>
    </main>

    <script>
        const catMap = { 'ahmad': 'مسند أحمد', 'bukhari': 'صحيح البخاري', 'muslim': 'صحيح مسلم', 'tirmidhi': 'جامع الترمذي', 'abudawud': 'سنن أبي داود', 'nasai': 'سنن النسائي', 'ibnmajah': 'سنن ابن ماجه', 'malik': 'موطأ مالك' };
        
        let page = 1;
        let currentCat = 'all';
        let query = '';
        let loading = false;
        let hasMore = true;

        const grid = document.getElementById('main-grid');
        const catList = document.getElementById('cat-list');
        const search = document.getElementById('main-search');

        async function fetchCategories() {
            try {
                const res = await fetch('/api/categories');
                const json = await res.json();
                if(json.status === 'success') {
                    json.data.forEach(c => {
                        const card = document.createElement('div');
                        card.className = 'cat-card';
                        card.dataset.cat = c;
                        card.innerHTML = `<i data-lucide="book"></i>${catMap[c] || c}`;
                        catList.appendChild(card);
                    });
                    lucide.createIcons();
                }
            } catch(e) {}
        }

        async function loadHadiths(reset = false) {
            if (loading || (!hasMore && !reset)) return;
            loading = true;
            if (reset) { page = 1; grid.innerHTML = ''; hasMore = true; }

            try {
                const res = await fetch(`/api/hadiths?category=${currentCat}&q=${encodeURIComponent(query)}&page=${page}&limit=20`);
                const json = await res.json();
                if(json.status === 'success') {
                    if (json.data.length < 20) hasMore = false;
                    render(json.data);
                    page++;
                    document.getElementById('stats').textContent = `تم تحميل ${grid.children.length} حديث`;
                }
            } catch(e) { console.error(e); }
            loading = false;
        }

        function render(data) {
            data.forEach(h => {
                const card = document.createElement('div');
                card.className = 'hadith-card';
                card.innerHTML = `
                    <div class="sanad-box"><i data-lucide="user" style="width:14px; margin-left:5px"></i> السند: ${h.chapter}</div>
                    <div class="hadith-text">${h.text}</div>
                    ${h.english ? `<div class="hadith-english">${h.english}</div>` : ''}
                    <div class="hadith-footer">
                        <div class="badge"><i data-lucide="bookmark" style="width:12px"></i> ${h.source}</div>
                        ${h.ref ? `<div class="badge">${h.ref}</div>` : ''}
                        ${h.grade ? `<div class="badge grade-badge">${h.grade}</div>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // Infinite Scroll Logic
        const observer = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting) loadHadiths();
        }, { threshold: 0.1 });
        observer.observe(document.getElementById('load-more-trigger'));

        catList.addEventListener('click', e => {
            const card = e.target.closest('.cat-card');
            if(!card) return;
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            currentCat = card.dataset.cat;
            loadHadiths(true);
        });

        let timer;
        search.addEventListener('input', e => {
            clearTimeout(timer);
            timer = setTimeout(() => { query = e.target.value; loadHadiths(true); }, 600);
        });

        fetchCategories();
        lucide.createIcons();
    </script>
</body>
</html>
