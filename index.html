<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة السنة النبوية | التصميم الإسلامي المزخرف</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@300;400;500;700;800;900&display=swap');

        :root {
            --islamic-green: #064e3b;
            --emerald: #065f46;
            --gold: #d4af37;
            --gold-light: #f4e4bc;
            --bg-cream: #fdfbf7;
            --text-dark: #1a1a1a;
            --text-muted: #4b5563;
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }

        body {
            background-color: var(--bg-cream);
            background-image: url('https://www.transparenttextures.com/patterns/islamic-exercise.png'); /* نمط إسلامي خفيف */
            color: var(--text-dark);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        /* Header Decorative */
        header {
            background: var(--islamic-green);
            color: white;
            padding: 1.5rem 5%;
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            border-bottom: 3px solid var(--gold);
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { 
            display: flex; align-items: center; gap: 12px; 
            font-size: 1.8rem; font-weight: 900; color: var(--gold);
            font-family: 'Amiri', serif;
        }

        /* Hero Section with Arch */
        .hero {
            text-align: center; padding: 4rem 1rem;
            background: linear-gradient(rgba(6, 78, 59, 0.9), rgba(6, 78, 59, 0.8)), url('https://images.unsplash.com/photo-1590076215667-873d6f009ad4?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center;
            color: white; clip-path: ellipse(150% 100% at 50% 0%);
            margin-bottom: 3rem;
        }
        .hero h1 { font-family: 'Amiri', serif; font-size: 4rem; margin-bottom: 1rem; color: var(--gold); }

        /* Search Box Decorative */
        .search-box {
            max-width: 700px; margin: -50px auto 3rem;
            background: white; border: 2px solid var(--gold);
            border-radius: 15px; padding: 1rem 2rem;
            display: flex; align-items: center; gap: 1rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .search-box input { background: transparent; border: none; width: 100%; font-size: 1.1rem; outline: none; }

        /* Categories Scroll */
        .categories-grid {
            display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; margin-bottom: 3rem;
            scrollbar-width: thin; scrollbar-color: var(--gold) transparent;
        }
        .cat-card {
            flex: 0 0 auto; background: white; border: 1px solid #e5e7eb;
            border-radius: 10px; padding: 0.7rem 1.5rem; cursor: pointer; transition: var(--transition);
            font-weight: bold; color: var(--islamic-green);
        }
        .cat-card.active { background: var(--islamic-green); color: var(--gold); border-color: var(--gold); }

        /* Hadith Cards - Ornate Design */
        .hadith-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2.5rem; }
        
        .hadith-card {
            background: white;
            border: 1px solid #d1d5db;
            border-radius: 5px; padding: 2.5rem;
            position: relative; transition: var(--transition);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            /* زخارف الزوايا */
            background-image: 
                url('https://www.transparenttextures.com/patterns/cream-pixels.png'),
                linear-gradient(to bottom, transparent, #fffdfa);
        }
        /* براويز إسلامية في الزوايا */
        .hadith-card::after {
            content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.3); pointer-events: none;
        }

        .hadith-text { 
            font-family: 'Amiri', serif; font-size: 1.6rem; text-align: justify; 
            margin-bottom: 1.5rem; color: var(--islamic-green); line-height: 2.3;
            position: relative; z-index: 1;
        }

        .sanad-box { 
            font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem;
            border-bottom: 1px solid var(--gold-light); padding-bottom: 5px;
            font-style: italic;
        }

        .hadith-footer {
            margin-top: auto; padding-top: 1rem;
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start;
        }
        .badge { 
            background: var(--gold-light); color: var(--islamic-green); 
            padding: 3px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: bold;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        /* WhatsApp Button */
        .whatsapp-btn {
            position: fixed; bottom: 30px; left: 30px;
            background: #25d366; color: white;
            width: 65px; height: 65px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.4);
            z-index: 10000; transition: var(--transition);
            text-decoration: none;
        }
        .whatsapp-btn:hover { transform: scale(1.1) rotate(10deg); }

        #load-more-trigger { height: 120px; display: flex; align-items: center; justify-content: center; width: 100%; }

        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-spinner { width: 35px; height: 35px; border: 3px solid #e5e7eb; border-top-color: var(--gold); border-radius: 50%; animation: spin 1s infinite linear; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i data-lucide="mosque"></i>
            <span>موسوعة<span>السنة</span></span>
        </div>
        <div id="stats" style="font-size: 0.85rem; opacity: 0.9;">تحميل أحاديث المصطفى ﷺ...</div>
    </header>

    <section class="hero">
        <h1>مَوْسُوعَةُ الحَدِيثِ الشَّرِيفِ</h1>
        <p style="font-size: 1.3rem; opacity: 0.9;">بوابة الأحاديث النبوية والأسانيد الموثقة</p>
    </section>

    <main class="container">
        <div class="search-box">
            <i data-lucide="search" style="color: var(--gold);"></i>
            <input type="text" id="main-search" placeholder="ابحث في المتون أو المواضيع الفقهية...">
        </div>

        <div class="categories-grid" id="cat-list">
            <div class="cat-card active" data-cat="all">كافة الكتب</div>
        </div>

        <div class="hadith-grid" id="main-grid"></div>
        <div id="load-more-trigger"><div class="loading-spinner"></div></div>
    </main>

    <!-- WhatsApp Button -->
    <a href="https://wa.me/20102891489" class="whatsapp-btn" target="_blank" title="تواصل معنا عبر واتساب">
        <i data-lucide="message-circle" style="width: 35px; height: 35px;"></i>
    </a>

    <script>
        const catMap = { 'ahmad': 'مسند أحمد', 'bukhari': 'صحيح البخاري', 'muslim': 'صحيح مسلم', 'tirmidhi': 'جامع الترمذي', 'abudawud': 'سنن أبي داود', 'nasai': 'سنن النسائي', 'ibnmajah': 'سنن ابن ماجه', 'malik': 'موطأ مالك' };
        
        let page = 1;
        let currentCat = 'all';
        let query = '';
        let loading = false;
        let hasMore = true;

        const grid = document.getElementById('main-grid');
        const catList = document.getElementById('cat-list');
        const search = document.getElementById('main-search');

        async function fetchCategories() {
            try {
                const res = await fetch('/api/categories');
                const json = await res.json();
                if(json.status === 'success') {
                    json.data.forEach(c => {
                        const card = document.createElement('div');
                        card.className = 'cat-card';
                        card.dataset.cat = c;
                        card.textContent = catMap[c] || c;
                        catList.appendChild(card);
                    });
                }
            } catch(e) {}
        }

        async function loadHadiths(reset = false) {
            if (loading || (!hasMore && !reset)) return;
            loading = true;
            if (reset) { page = 1; grid.innerHTML = ''; hasMore = true; }

            try {
                const res = await fetch(`/api/hadiths?category=${currentCat}&q=${encodeURIComponent(query)}&page=${page}&limit=15`);
                const json = await res.json();
                if(json.status === 'success') {
                    if (json.data.length < 15) hasMore = false;
                    render(json.data);
                    page++;
                    document.getElementById('stats').textContent = `تم عرض ${grid.children.length} حديث شريف`;
                }
            } catch(e) {}
            loading = false;
        }

        function render(data) {
            data.forEach(h => {
                const card = document.createElement('div');
                card.className = 'hadith-card';
                card.innerHTML = `
                    <div class="sanad-box">عن ${h.chapter}</div>
                    <div class="hadith-text">${h.text}</div>
                    <div class="hadith-footer">
                        <div class="badge">${h.source}</div>
                        ${h.ref ? `<div class="badge">${h.ref}</div>` : ''}
                        ${h.grade ? `<div class="badge" style="background:var(--emerald); color:white">${h.grade}</div>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        const observer = new IntersectionObserver(entries => {
            if (entries[0].isIntersecting) loadHadiths();
        }, { threshold: 0.1 });
        observer.observe(document.getElementById('load-more-trigger'));

        catList.addEventListener('click', e => {
            const card = e.target.closest('.cat-card');
            if(!card) return;
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            currentCat = card.dataset.cat;
            loadHadiths(true);
        });

        let timer;
        search.addEventListener('input', e => {
            clearTimeout(timer);
            timer = setTimeout(() => { query = e.target.value; loadHadiths(true); }, 600);
        });

        fetchCategories();
        lucide.createIcons();
    </script>
</body>
</html>
