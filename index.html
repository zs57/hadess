<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الحديث الشريف | الإصدار الذهبي</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@300;400;500;700;800;900&display=swap');

        :root {
            --bg-primary: #05080a;
            --bg-secondary: #0d1217;
            --accent-gold: #d4af37;
            --accent-emerald: #10b981;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(13, 18, 23, 0.8);
            --glass-border: rgba(212, 175, 55, 0.2);
            --transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; scroll-behavior: smooth; }

        body {
            background: radial-gradient(circle at 0% 0%, #1a3a32 0%, #05080a 50%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.8;
            overflow-x: hidden;
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 2rem; }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 5%;
            position: sticky; top: 0; z-index: 1000;
            display: flex; justify-content: space-between; align-items: center;
        }

        .logo { 
            display: flex; align-items: center; gap: 12px; 
            font-size: 2rem; font-weight: 900; 
            background: linear-gradient(to right, var(--accent-gold), #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .hero {
            text-align: center; padding: 6rem 1rem;
            background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .hero h1 { font-size: 4rem; margin-bottom: 1.5rem; font-family: 'Amiri', serif; color: var(--accent-gold); text-shadow: 0 0 30px rgba(212, 175, 55, 0.3); }

        .search-box {
            max-width: 800px; margin: -40px auto 4rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 50px; padding: 1.2rem 2.5rem;
            display: flex; align-items: center; gap: 1.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transition: var(--transition);
        }
        .search-box:focus-within { transform: scale(1.02); border-color: var(--accent-gold); box-shadow: 0 0 50px rgba(212, 175, 55, 0.2); }
        .search-box input { background: transparent; border: none; color: white; width: 100%; font-size: 1.2rem; outline: none; }

        .categories-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem; margin-bottom: 4rem;
        }
        .cat-card {
            background: var(--bg-secondary);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 1.5rem;
            text-align: center; cursor: pointer;
            transition: var(--transition);
            position: relative; overflow: hidden;
        }
        .cat-card:hover, .cat-card.active {
            background: linear-gradient(145deg, #1a3a32, #0d1217);
            border-color: var(--accent-gold);
            transform: translateY(-5px);
        }
        .cat-card i { font-size: 1.5rem; color: var(--accent-gold); margin-bottom: 10px; }

        .hadith-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2.5rem; }
        .hadith-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px; padding: 2.5rem;
            position: relative; transition: var(--transition);
            display: flex; flex-direction: column;
        }
        .hadith-card::before {
            content: '“'; position: absolute; top: 10px; left: 20px;
            font-size: 5rem; color: var(--accent-gold); opacity: 0.1; font-family: serif;
        }
        .hadith-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--accent-gold); box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        .hadith-text { font-family: 'Amiri', serif; font-size: 1.6rem; text-align: justify; margin-bottom: 2rem; color: #fff; }
        .hadith-english { font-size: 0.95rem; color: var(--text-secondary); text-align: left; direction: ltr; margin-bottom: 2rem; border-left: 2px solid var(--accent-gold); padding-left: 1.5rem; }
        
        .hadith-footer {
            margin-top: auto; padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex; justify-content: space-between; align-items: center;
        }
        .badge { background: rgba(212, 175, 55, 0.1); color: var(--accent-gold); padding: 4px 12px; border-radius: 10px; font-size: 0.8rem; font-weight: bold; }

        .loading-shimmer {
            background: linear-gradient(90deg, #0d1217 25%, #1a3a32 50%, #0d1217 75%);
            background-size: 200% 100%; animation: shimmer 1.5s infinite linear;
        }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: slideIn 0.8s ease forwards; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-primary); }
        ::-webkit-scrollbar-thumb { background: var(--accent-gold); border-radius: 10px; }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <i data-lucide="shield-check"></i>
            <span>منصة<span>الحديث</span></span>
        </div>
        <div style="color: var(--accent-gold); font-weight: bold;">50,000+ حديث شريف</div>
    </header>

    <section class="hero">
        <h1 class="animate">مَوْسُوعَةُ الحَدِيثِ الشَّرِيفِ</h1>
        <p class="animate" style="font-size: 1.2rem; color: var(--text-secondary);">البحث الذكي والتصنيف الفاخر للسنة النبوية المطهرة</p>
    </section>

    <main class="container">
        <div class="search-box animate">
            <i data-lucide="search" style="color: var(--accent-gold);"></i>
            <input type="text" id="main-search" placeholder="ابحث في المتون، الرواة، أو الكتب...">
        </div>

        <div style="margin-bottom: 1.5rem; font-weight: bold; color: var(--accent-gold);">تصفح حسب الكتاب:</div>
        <div class="categories-grid" id="cat-list">
            <div class="cat-card active" data-cat="all">
                <i data-lucide="layout-grid"></i>
                <div>كل الأحاديث</div>
            </div>
        </div>

        <div class="hadith-grid" id="main-grid"></div>
    </main>

    <script>
        const catMap = {
            'ahmad': 'مسند أحمد',
            'bukhari': 'صحيح البخاري',
            'muslim': 'صحيح مسلم',
            'tirmidhi': 'جامع الترمذي',
            'abudawud': 'سنن أبي داود',
            'nasai': 'سنن النسائي',
            'ibnmajah': 'سنن ابن ماجه',
            'malik': 'موطأ مالك'
        };

        const grid = document.getElementById('main-grid');
        const catList = document.getElementById('cat-list');
        const search = document.getElementById('main-search');
        let currentCat = 'all';

        async function fetchCategories() {
            try {
                const res = await fetch('/api/categories');
                const json = await res.json();
                if(json.status === 'success') {
                    json.data.forEach(c => {
                        const card = document.createElement('div');
                        card.className = 'cat-card';
                        card.dataset.cat = c;
                        card.innerHTML = `
                            <i data-lucide="book"></i>
                            <div>${catMap[c] || c}</div>
                        `;
                        catList.appendChild(card);
                    });
                    lucide.createIcons();
                }
            } catch(e) {}
        }

        async function fetchHadiths(q = '') {
            grid.innerHTML = Array(6).fill('<div class="hadith-card loading-shimmer" style="height:300px"></div>').join('');
            try {
                const res = await fetch(`/api/hadiths?category=${currentCat}&q=${encodeURIComponent(q)}`);
                const json = await res.json();
                if(json.status === 'success') render(json.data);
            } catch(e) { grid.innerHTML = 'خطأ في التحميل'; }
        }

        function render(data) {
            if(data.length === 0) { grid.innerHTML = '<div style="grid-column:1/-1;text-align:center">لا يوجد نتائج</div>'; return; }
            grid.innerHTML = data.map((h, i) => `
                <div class="hadith-card animate" style="animation-delay:${i*0.1}s">
                    <div class="hadith-text">${h.text}</div>
                    ${h.english ? `<div class="hadith-english">${h.english}</div>` : ''}
                    <div class="hadith-footer">
                        <div class="badge">${h.source}</div>
                        <div style="font-size:0.8rem; color:var(--accent-gold)">${h.chapter}</div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        catList.addEventListener('click', e => {
            const card = e.target.closest('.cat-card');
            if(!card) return;
            document.querySelectorAll('.cat-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            currentCat = card.dataset.cat;
            fetchHadiths();
        });

        let timer;
        search.addEventListener('input', e => {
            clearTimeout(timer);
            timer = setTimeout(() => fetchHadiths(e.target.value), 600);
        });

        fetchCategories();
        fetchHadiths();
        lucide.createIcons();
    </script>
</body>
</html>
