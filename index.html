<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الحديث الشريف | الإصدار الفاخر</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Tajawal:wght@300;400;500;700;800;900&display=swap');

        :root {
            --bg-primary: #0a0e12;
            --bg-secondary: #141b22;
            --accent-gold: #c5a059;
            --accent-emerald: #10b981;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(20, 27, 34, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }

        body {
            background: radial-gradient(circle at top right, #0d2a23, #0a0e12);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }

        header {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1.5rem 2rem;
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-content { display: flex; justify-content: space-between; align-items: center; }
        .logo { display: flex; align-items: center; gap: 1rem; font-size: 1.8rem; font-weight: 900; color: var(--accent-gold); }

        .search-container {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 1rem 2rem;
            display: flex; gap: 1rem; margin: 3rem 0;
            transition: var(--transition);
        }

        .search-container:focus-within { border-color: var(--accent-emerald); }
        .search-container input { background: transparent; border: none; color: white; width: 100%; outline: none; }

        .categories-wrapper { display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 1rem; margin-bottom: 2rem; }
        .category-pill {
            background: var(--bg-secondary); border: 1px solid var(--glass-border);
            padding: 0.8rem 1.5rem; border-radius: 30px; cursor: pointer; transition: var(--transition);
        }
        .category-pill.active { background: var(--accent-emerald); color: white; }

        .hadith-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 2rem; }
        .hadith-card {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            border-radius: 24px; padding: 2rem; transition: var(--transition);
        }
        .hadith-card:hover { transform: translateY(-10px); border-color: var(--accent-gold); }

        .hadith-text { font-family: 'Amiri', serif; font-size: 1.4rem; line-height: 2; text-align: right; margin-bottom: 1.5rem; }
        .hadith-meta { border-top: 1px solid var(--glass-border); padding-top: 1rem; display: flex; justify-content: space-between; color: var(--text-secondary); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: fadeInUp 0.6s ease forwards; }

        .skeleton { height: 200px; background: var(--bg-secondary); border-radius: 24px; }
    </style>
</head>
<body>
    <header>
        <div class="nav-content">
            <div class="logo">
                <i data-lucide="book-open"></i>
                <span>منصة<span>الحديث</span></span>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="hero-section animate-up">
            <h1 style="font-size: 3rem; margin-bottom: 1rem; color: var(--accent-gold);">كنوز النبوة</h1>
            <p style="color: var(--text-secondary); margin-bottom: 3rem;">تصفح آلاف الأحاديث النبوية الشريفة بتجربة رقمية فريدة</p>
        </section>

        <div id="featured-hadith" class="animate-up" style="margin-bottom: 4rem;">
            <div class="hadith-card" style="background: linear-gradient(145deg, rgba(16, 185, 129, 0.1), rgba(197, 160, 89, 0.1)); border: 1px solid var(--accent-gold);">
                <div style="color: var(--accent-gold); font-weight: 800; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;">
                    <i data-lucide="star"></i> حديث اليوم المختار
                </div>
                <div class="hadith-text" id="featured-text">جاري التحميل من القاعدة...</div>
                <div class="hadith-meta">
                    <span class="hadith-source" id="featured-source">---</span>
                </div>
            </div>
        </div>

        <div class="search-container animate-up">
            <i data-lucide="search" style="color: var(--text-secondary);"></i>
            <input type="text" id="hadith-search" placeholder="ابحث عن حديث، راوٍ، أو كتاب...">
        </div>

        <div class="categories-wrapper animate-up" id="categories-container">
            <div class="category-pill active" data-category="all">الكل</div>
            <div class="category-pill" data-category="sahih">صحيح البخاري</div>
            <div class="category-pill" data-category="muslim">صحيح مسلم</div>
        </div>

        <div class="hadith-grid" id="hadith-results"></div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const resultsContainer = document.getElementById('hadith-results');
            const searchInput = document.getElementById('hadith-search');
            const categoriesContainer = document.getElementById('categories-container');
            const featuredText = document.getElementById('featured-text');
            const featuredSource = document.getElementById('featured-source');
            
            let currentCategory = 'all';

            async function loadHadiths(page = 1, category = 'all', query = '') {
                resultsContainer.innerHTML = Array(6).fill(0).map(() => `<div class="hadith-card skeleton"></div>`).join('');
                try {
                    let url = `/api/hadiths?page=${page}&category=${category}`;
                    if (query) url += `&q=${encodeURIComponent(query)}`;
                    const response = await fetch(url);
                    const result = await response.json();
                    if (result.status === 'success') { renderCards(result.data); }
                    else { showError("خطأ من السيرفر: " + result.message); }
                } catch (error) { 
                    showError("فشل تقني: " + error.message); 
                    console.error(error);
                }
            }

            function renderCards(hadiths) {
                if (!hadiths || hadiths.length === 0) {
                    resultsContainer.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 4rem;"><h3>لم يتم العثور على أحاديث</h3></div>`;
                    lucide.createIcons();
                    return;
                }
                resultsContainer.innerHTML = hadiths.map((h, index) => `
                    <div class="hadith-card animate-up" style="animation-delay: ${index * 0.05}s">
                        <div class="hadith-text">${h.text}</div>
                        <div class="hadith-meta">
                            <span class="hadith-source">${h.source}</span>
                            <span class="hadith-chapter">${h.chapter || ''}</span>
                        </div>
                    </div>
                `).join('');
                lucide.createIcons();
            }

            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => { loadHadiths(1, currentCategory, e.target.value); }, 500);
            });

            categoriesContainer.addEventListener('click', (e) => {
                const pill = e.target.closest('.category-pill');
                if (!pill) return;
                document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                currentCategory = pill.dataset.category;
                loadHadiths(1, currentCategory);
            });

            async function loadFeatured() {
                try {
                    const response = await fetch('/api/hadiths?limit=1');
                    const result = await response.json();
                    if (result.status === 'success' && result.data.length > 0) {
                        const h = result.data[0];
                        featuredText.textContent = h.text;
                        featuredSource.textContent = h.source;
                    }
                } catch (e) { featuredText.textContent = "لا يمكن تحميل حديث اليوم حالياً."; }
            }

            function showError(msg) { resultsContainer.innerHTML = `<div style="grid-column: 1/-1; color: #ef4444; text-align: center; padding: 2rem;">${msg}</div>`; }

            loadFeatured();
            loadHadiths();
            lucide.createIcons();
        });
    </script>
</body>
</html>
