<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسوعة الحديث الشريف | المخطوطة الرقمية</title>
    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400;1,700&family=Cairo:wght@400;600;700;900&family=Tajawal:wght@300;400;500;700;800;900&display=swap');

        :root {
            --paper: #f9f8f4;
            --paper-white: #ffffff;
            --ink: #1a1a1a;
            --ink-light: #4a4a4a;
            --border: #dcd7cb;
            --highlight-yellow: #ffde6b;
            --highlight-orange: #f4a261;
            --accent-green: #2a9d8f;
            --accent-red: #e76f51;
            --shadow-color: rgba(26, 26, 26, 0.15);
            --glass: rgba(255,255,255,0.65);
            --gradient-hero: linear-gradient(135deg, #e76f51 0%, #f4a261 50%, #ffde6b 100%);
            --gradient-card: linear-gradient(145deg, #fff 0%, #f9f8f4 100%);
        }

        [data-theme="dark"] {
            --paper: #0f1114;
            --paper-white: #1a1d23;
            --ink: #f1f5f9;
            --ink-light: #cbd5e1;
            --border: #334155;
            --shadow-color: rgba(0, 0, 0, 0.4);
            --glass: rgba(15, 17, 20, 0.8);
        }

        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}

        body {
            background-color: var(--paper);
            background-image:
                radial-gradient(circle at 20% 20%, rgba(231,111,81,0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(42,157,143,0.06) 0%, transparent 50%),
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            color: var(--ink);
            font-family: "Cairo", sans-serif;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* ====== NAV ====== */
        nav {
            position:fixed;top:0;left:0;right:0;z-index:1000;
            padding:0.8rem 2.5rem;
            display:flex;align-items:center;justify-content:space-between;
            background:var(--glass);
            backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
            border-bottom:2px solid var(--ink);
        }

        .nav-logo{font-family:"Amiri",serif;font-size:1.8rem;color:var(--ink);text-decoration:none; font-weight: 900;}
        .nav-logo span{color:var(--accent-red)}
        
        .theme-toggle {
            width: 45px; height: 45px; border: 2px solid var(--ink); border-radius: 10px;
            background: var(--paper-white); cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; color: var(--ink); box-shadow: 3px 3px 0 var(--ink);
        }

        /* ====== HERO ====== */
        .hero { padding: 8rem 2.5rem 4rem; text-align: center; }
        .hero-badge {
            display:inline-block; background:var(--gradient-hero); border:2px solid var(--ink);
            padding:.4rem .9rem; border-radius:20px; box-shadow:2px 2px 0 var(--ink); margin-bottom:1rem; font-weight:700;
        }
        .hero-title { font-size: clamp(2rem, 5vw, 4rem); font-family: "Amiri", serif; font-weight: 900; margin-bottom: 1rem; }
        .highlight { position:relative; z-index:1; }
        .highlight::before { content:""; position:absolute; z-index:-1; bottom:8px; left:-4px; right:-4px; height:14px; background:var(--highlight-yellow); border-radius:2px; }

        /* ====== SEARCH ====== */
        .search-panel { max-width: 800px; margin: 0 auto 3rem; }
        .input-group { position: relative; }
        .input-group i { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 1.4rem; color: var(--accent-red); }
        .input-group input {
            width: 100%; border: 2px solid var(--ink); border-radius: 12px; padding: 1rem 3.5rem 1rem 1.5rem;
            font-size: 1.1rem; background: var(--paper-white); box-shadow: 4px 4px 0 var(--shadow-color);
        }

        /* ====== BOOKS SELECTION ====== */
        .section-tag { display:inline-block; background:var(--ink); color:#fff; padding:.3rem 1rem; border-radius:18px; transform:rotate(-2deg); margin-bottom:.8rem; font-size:.9rem; }
        .surahs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; margin-bottom: 3rem; }
        .surah-card {
            background: var(--paper-white); border: 2px solid var(--border); border-radius: 12px; padding: 1.2rem;
            display: flex; align-items: center; justify-content: space-between; gap: 1rem; cursor: pointer;
            box-shadow: 3px 3px 0 var(--shadow-color); transition: all 0.3s;
        }
        .surah-card:hover, .surah-card.active { border-color: var(--accent-green); background: var(--highlight-yellow); transform: translateY(-3px) rotate(-1deg); box-shadow: 5px 7px 0 var(--shadow-color); }
        .surah-num { background: var(--paper); border: 2px solid var(--ink); border-radius: 50%; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; font-weight: 900; color: var(--accent-red); flex-shrink: 0; }
        .surah-name-ar { font-family: "Amiri", serif; font-size: 1.4rem; color: var(--accent-green); font-weight: 700; }

        /* ====== HADITH CARDS ====== */
        .hadith-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 2rem; }
        .notebook {
            background: var(--paper-white); border: 2px solid var(--ink); border-radius: 4px 15px 15px 4px;
            padding: 2rem; box-shadow: 8px 8px 0 var(--shadow-color); position: relative;
            animation: fadeInUp 0.6s ease both;
        }
        .notebook::before {
            content: ""; position: absolute; top: 10px; bottom: 10px; right: 10px; width: 4px;
            background: repeating-linear-gradient(to bottom, var(--ink), var(--ink) 4px, transparent 4px, transparent 20px);
        }

        .hadith-text { font-family: "Amiri", serif; font-size: 1.5rem; line-height: 2.2; margin-bottom: 1.5rem; text-align: justify; }
        .tafsir-block { border-right: 4px solid var(--accent-green); background: rgba(42, 157, 143, 0.05); padding: 1rem; border-radius: 4px 12px 12px 4px; font-size: 0.95rem; line-height: 1.8; margin-bottom: 1.5rem; }
        
        .card-footer { display: flex; flex-wrap: wrap; gap: 8px; border-top: 1px dashed var(--border); padding-top: 1rem; }
        .badge { padding: 4px 12px; border: 1px solid var(--ink); border-radius: 6px; font-size: 0.75rem; font-weight: 800; background: var(--paper); }
        .badge.high { background: var(--accent-red); color: white; }

        /* ====== WHATSAPP ====== */
        .nav-cta {
            position: fixed; bottom: 30px; left: 30px; z-index: 1000;
            background: #25d366; color: white; border: 2px solid var(--ink);
            padding: 1rem; border-radius: 50%; box-shadow: 4px 4px 0 var(--ink);
            text-decoration: none; display: flex; align-items: center; justify-content: center;
        }

        /* Animations */
        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)} }
        
        #load-more { height: 100px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <nav>
        <a href="#" class="nav-logo">موسوعة<span>الحديث</span></a>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <div style="font-weight: 800; font-size: 0.8rem; color: var(--accent-red);">50,000+ حديث</div>
            <button class="theme-toggle" onclick="toggleTheme()"><i class="ri-moon-line" id="theme-icon"></i></button>
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <div class="hero-badge">مخطوطة السنة النبوية</div>
            <h1 class="hero-title">مَوْسُوعَةُ <span class="highlight">الحديث الشريف</span></h1>
            <p style="color: var(--ink-light); font-weight: 700;">تصفح كنوز النبوة بأرقى واجهة ورقية رقمية</p>
        </section>

        <div class="search-panel">
            <div class="input-group">
                <i class="ri-search-eye-line"></i>
                <input type="text" id="search-box" placeholder="ابحث عن موضوع، راوٍ، أو كلمة في المتن...">
            </div>
        </div>

        <div class="section-tag"><i class="ri-book-3-line"></i> الكتب المتوفرة</div>
        <div class="surahs-grid" id="books-list">
            <div class="surah-card active" data-cat="all">
                <div class="surah-num">00</div>
                <div class="surah-info"><div class="surah-name">كافة الكتب</div></div>
                <div class="surah-name-ar">الكل</div>
            </div>
        </div>

        <div class="section-tag"><i class="ri-file-list-3-line"></i> الأحاديث والأسانيد</div>
        <div class="hadith-grid" id="hadith-grid"></div>
        <div id="load-more"><div style="border: 4px solid var(--border); border-top-color: var(--accent-red); width: 40px; height: 40px; border-radius: 50%; animation: rotate 1s infinite linear;"></div></div>
    </main>

    <a href="https://wa.me/20102891489" class="nav-cta"><i class="ri-whatsapp-line" style="font-size: 2rem;"></i></a>

    <script>
        const catMap = { 'ahmad': 'مسند أحمد', 'bukhari': 'صحيح البخاري', 'muslim': 'صحيح مسلم', 'tirmidhi': 'جامع الترمذي', 'abudawud': 'سنن أبي داود', 'nasai': 'سنن النسائي', 'ibnmajah': 'سنن ابن ماجه', 'malik': 'موطأ مالك' };
        let page = 1; let currentCat = 'all'; let query = ''; let loading = false; let hasMore = true;

        const grid = document.getElementById('hadith-grid');
        const booksList = document.getElementById('books-list');
        const searchBox = document.getElementById('search-box');

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            html.setAttribute('data-theme', isDark ? 'light' : 'dark');
            document.getElementById('theme-icon').className = isDark ? 'ri-moon-line' : 'ri-sun-line';
        }

        async function fetchCats() {
            const res = await fetch('/api/categories');
            const json = await res.json();
            json.data.forEach((c, index) => {
                const card = document.createElement('div');
                card.className = 'surah-card';
                card.dataset.cat = c;
                card.innerHTML = `
                    <div class="surah-num">${(index+1).toString().padStart(2, '0')}</div>
                    <div class="surah-info"><div class="surah-name">${catMap[c] || c}</div></div>
                    <div class="surah-name-ar">${catMap[c] ? catMap[c].split(' ')[0] : 'كتاب'}</div>
                `;
                booksList.appendChild(card);
            });
        }

        async function loadHadiths(reset = false) {
            if (loading || (!hasMore && !reset)) return;
            loading = true;
            if (reset) { page = 1; grid.innerHTML = ''; hasMore = true; }

            try {
                const res = await fetch(`/api/hadiths?category=${currentCat}&q=${encodeURIComponent(query)}&page=${page}&limit=20`);
                const json = await res.json();
                if(json.data.length < 20) hasMore = false;
                render(json.data);
                page++;
            } catch(e) {}
            loading = false;
        }

        function render(data) {
            data.forEach(h => {
                const card = document.createElement('div');
                card.className = 'notebook';
                card.innerHTML = `
                    <div style="font-family:'Cairo'; font-weight:900; color:var(--accent-red); margin-bottom:1rem; font-size:0.9rem;">
                        <i class="ri-user-line"></i> الراوي: ${h.chapter}
                    </div>
                    <div class="hadith-text">${h.text}</div>
                    ${h.english ? `<div class="tafsir-block" style="direction:ltr; text-align:left;">${h.english}</div>` : ''}
                    <div class="card-footer">
                        <div class="badge"><i class="ri-bookmark-3-line"></i> ${h.source}</div>
                        ${h.ref ? `<div class="badge"><i class="ri-hashtag"></i> ${h.ref}</div>` : ''}
                        ${h.grade ? `<div class="badge high"><i class="ri-shield-check-line"></i> ${h.grade}</div>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        const obs = new IntersectionObserver(e => { if(e[0].isIntersecting) loadHadiths(); }, {threshold:0.1});
        obs.observe(document.getElementById('load-more'));

        booksList.addEventListener('click', e => {
            const card = e.target.closest('.surah-card');
            if(!card) return;
            document.querySelectorAll('.surah-card').forEach(c => c.classList.remove('active'));
            card.classList.add('active');
            currentCat = card.dataset.cat;
            loadHadiths(true);
        });

        let timer;
        searchBox.addEventListener('input', e => {
            clearTimeout(timer);
            timer = setTimeout(() => { query = e.target.value; loadHadiths(true); }, 600);
        });

        fetchCats();
        loadHadiths();
    </script>
    <style>@keyframes rotate { to{transform:rotate(360deg)} }</style>
</body>
</html>
